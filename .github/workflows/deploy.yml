name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # ប្រើ --legacy-peer-deps និង --no-package-lock ដើម្បីកុំឱ្យវាជាន់គ្នា
        run: npm install --legacy-peer-deps --no-package-lock

      - name: Build
        # ថែម CI=false ដើម្បីកុំឱ្យវា Error ពេលមាន Warning
        run: CI=false npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
